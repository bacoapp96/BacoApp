<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BacoApp</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <img src="/img/logo_bacoapp.png" class="logo" alt="BacoApp">

      <span class="login-eyebrow">BACOAPP</span>
      <h1>Iniciar sesion</h1>
      <p class="login-copy">Accede a tu tienda o al panel administrativo con el estilo dorado de BacoApp.</p>

      <form id="form-login" class="login-form">
        <label for="Usuario">Usuario</label>
        <input type="text" id="Usuario" class="input" placeholder="Tu usuario" required autocomplete="username">

        <label for="password">Contrasena</label>
        <input type="password" id="password" class="input" placeholder="Tu contrasena" required autocomplete="current-password">

        <button type="submit" class="btn btn-primary">Entrar</button>
        <p id="login-message" class="login-message" aria-live="polite"></p>
      </form>

      <div class="login-links">
        <p>No tienes cuenta?</p>
        <a href="/registro.html">Registrarse</a>
        <a href="/recovery">Olvidaste tu contrasena?</a>
        <a href="/index.html" class="back">Volver</a>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
