<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro administradores</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/registro-admin.css">

</head>



<body>
    <header><h1>🔐 <div>Registro administradores</h1></div>
        <p>Registro exclusivo administradores.
    </header>

    <div class="card" style="width: 450px; margin: 20px auto; padding: 30px;">
        <form id="formAdmin" style="display:flex; flex-direction: column; gap: 15px;">
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="NombreAdminLabel" for="NombreAdmin" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Nombre completo:</label>
            <input type="text" id="NombreAdmin" class="input" name="NombreAdmin" placeholder="Ingrese su nombre completo" required>
            </div>
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="DocumentoAdminLabel" for="DocumentoAdmin" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Documento de identidad:</label>
            <input type="number" id="DocumentoAdmin" class="input" name="DocumentoAdmin" placeholder="Ingrese su documento de identidad" required>
            </div>
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="EmailAdminLabel" for="EmailAdmin" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Email:</label>
            <input type="email" id="EmailAdmin" class="input" name="EmailAdmin" placeholder="Ingrese su email" autocomplete="email" required>
            </div>
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="UsuarioAdminLabel" for="UsuarioAdmin" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Usuario:</label>
            <input type="text" id="UsuarioAdmin" class="input" name="UsuarioAdmin" placeholder="Ingrese su usuario" required>
            </div>
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="PasswordAdminLabel" for="PasswordAdmin" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Contraseña:</label>
            <input type="password" id="PasswordAdmin" class="input" name="PasswordAdmin" placeholder="Ingrese su contraseña" required>
            </div>
            <div class="field" style="display: flex; flex-direction: column; text-align: left;">
            <label id="CodigoAuthLabel" for="CodigoAuth" style="font-size: 14px; margin-bottom: 5px; color: var(--gray);">Código de autorización:</label>
            <input type="text" id="CodigoAuth" class="input" name="CodigoAuth" placeholder="Ingrese el código de autorización" required>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-registrarse-admin" style="width: 100%; margin-top: 10px;">Registrarse</button>

            <div id="mensaje"> </div>

            <div style="margin-top: 15px; font-size: 14px;">
                ¿Ya tienes cuenta? <a href="login.html?rol=admin" style="color: var(--gold); text-decoration: underline;">Inicia sesión aquí</a>


            </div>

        </form>
    </div>
    <script src="/js/registro-admin.js"></script>
</body>
</html>
