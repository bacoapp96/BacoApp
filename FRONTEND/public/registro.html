<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/registro.css">
    <title>Registro</title>
</head>
<body>
    <div class="container" style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding: 40px 0;">
        <div class="card" style="width: 400px; padding: 30px;">
            <h1 style="font-size: 28px; margin-bottom: 20px;">Registro de Usuario</h1>
            <form id="registro-form" style="display:flex; flex-direction:column; gap:12px; text-align:left;">
                
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label for="username" style="font-size: 14px; color: var(--gray);">Nombre:</label>
                    <input type="text" id="username" class="input" name="username" required>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label for="user" style="font-size: 14px; color: var(--gray);">Usuario:</label>
                    <input type="text" id="user" class="input" name="user" required>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label for="email" style="font-size: 14px; color: var(--gray);">Correo Electrónico:</label>
                    <input type="email" id="email" class="input" name="email" required>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label for="password" style="font-size: 14px; color: var(--gray);">Contraseña:</label>
                    <input type="password" id="password" class="input" name="password" required>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label for="celular" style="font-size: 14px; color: var(--gray);">Celular:</label>
                    <input type="text" id="celular" class="input" name="celular" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 10px;">Registrar</button>
            </form>
            <div style="margin-top: 20px; font-size: 14px; text-align: center;">
                <p style="color: var(--gray);">¿Ya tienes una cuenta? <a href="login.html" style="color: var(--gold); text-decoration: underline; font-weight: bold;">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script src="/js/registro.js"></script>
</body>
</html>
